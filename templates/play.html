{% extends 'base.html' %}

{% block content %}
<div class="bg-white rounded-2xl shadow-xl p-8 border border-slate-100 text-center">

    <div class="flex justify-between items-center mb-6 text-sm text-slate-400 font-medium">
        <span id="score-counter">Aciertos: 0</span>
        <span id="group-tag" class="bg-slate-100 text-slate-600 px-2.5 py-1 rounded-md text-xs">Hiragana</span>
    </div>

    <div class="py-8 my-4 bg-slate-50 rounded-2xl border border-dashed border-slate-200">
        <div id="character-display" class="text-7xl font-extrabold text-slate-950 select-none animate-pulse">
            ...
        </div>
    </div>

    <form id="game-form" autocomplete="off" class="space-y-4">
        <div>
            <label for="user-input"
                class="block text-left text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">
                Escribe el Romaji (pronunciación):
            </label>
            <input type="text" id="user-input" required autofocus
                class="w-full text-center text-2xl font-bold p-3 bg-slate-50 border-2 border-slate-200 rounded-xl focus:border-indigo-500 focus:bg-white focus:outline-none transition uppercase tracking-widest">
        </div>

        <div id="feedback-message" class="hidden text-sm font-semibold p-3 rounded-xl transition-all"></div>

        <button type="submit"
            class="w-full bg-slate-900 hover:bg-slate-800 text-white font-medium py-3 px-4 rounded-xl shadow-lg transition duration-150">
            Comprobar
        </button>
    </form>
</div>

<script>
    let characters = [];
    let currentCharacter = null;
    let score = 0;

    // Nombre clave para guardar los errores en el navegador de forma persistente
    const STORAGE_KEY = 'hiragana_failed_characters';

    // Elements
    const characterDisplay = document.getElementById('character-display');
    const userInput = document.getElementById('user-input');
    const gameForm = document.getElementById('game-form');
    const feedbackMessage = document.getElementById('feedback-message');
    const scoreCounter = document.getElementById('score-counter');

    // --- FUNCIONES DE ALMACENAMIENTO (Manejo de errores) ---

    function getFailedIds() {
        const stored = localStorage.getItem(STORAGE_KEY);
        return stored ? JSON.parse(stored) : [];
    }

    function addFailedId(id) {
        let failedIds = getFailedIds();
        if (!failedIds.includes(id)) {
            failedIds.push(id);
            localStorage.setItem(STORAGE_KEY, JSON.stringify(failedIds));
        }
    }

    function removeFailedId(id) {
        let failedIds = getFailedIds();
        failedIds = failedIds.filter(failedId => failedId !== id);
        localStorage.setItem(STORAGE_KEY, JSON.stringify(failedIds));
    }

    // --- LÓGICA DEL JUEGO ---
    async function loadCharacters() {
        try {
            const urlParams = new URLSearchParams(window.location.search);
            const group = urlParams.get('group') || 'all';
            // CAPTURAMOS EL TIPO DE ALFABETO (Por defecto 'hiragana')
            const type = urlParams.get('type') || 'hiragana';

            // Actualizamos la etiqueta superior para mostrar Grupo + Tipo
            const groupTag = document.getElementById('group-tag');
            groupTag.innerText = `${type.toUpperCase()} - ${group.toUpperCase()}`;

            // Hacemos el fetch enviando AMBOS parámetros a Flask
            const response = await fetch(`/api/characters?group=${group}&type=${type}`);
            characters = await response.json();

            if (characters.length > 0) {
                characterDisplay.classList.remove('animate-pulse');
                nextQuestion();
            } else {
                characterDisplay.innerText = "Error: Sin datos";
            }
        } catch (error) {
            console.error("Error fetching characters:", error);
            characterDisplay.innerText = "❌";
        }
    }

    // SELECCIÓN INTELIGENTE DE CARACTERES
    function nextQuestion() {
        userInput.value = '';
        feedbackMessage.className = 'hidden text-sm font-semibold p-3 rounded-xl';

        const failedIds = getFailedIds();

        // Filtramos cuáles de los caracteres cargados están actualmente en la lista de fallos
        const poolOfFailures = characters.filter(c => failedIds.includes(c.id));

        let chosenCharacter = null;

        // Si hay errores registrados, tiramos un dado (0 a 1). 
        // Si sale menor a 0.30 (30% de probabilidad), forzamos un caracter de la lista de errores.
        if (poolOfFailures.length > 0 && Math.random() < 0.30) {
            const randomIndex = Math.floor(Math.random() * poolOfFailures.length);
            chosenCharacter = poolOfFailures[randomIndex];
            // Marcamos visualmente (opcional) que es un repaso poniendo el tag sutil
            document.getElementById('group-tag').innerText = "🔄 REPASO DE ERROR";
        } else {
            // 30% restante, o si no hay errores guardados: Selección 100% aleatoria general
            const randomIndex = Math.floor(Math.random() * characters.length);
            chosenCharacter = characters[randomIndex];

            const urlParams = new URLSearchParams(window.location.search);
            document.getElementById('group-tag').innerText = `Grupo: ${(urlParams.get('group') || 'all').toUpperCase()}`;
        }

        // Para evitar que salga exactamente el mismo caracter dos veces seguidas (si hay más opciones)
        if (currentCharacter && chosenCharacter.id === currentCharacter.id && characters.length > 1) {
            return nextQuestion();
        }

        currentCharacter = chosenCharacter;
        characterDisplay.innerText = currentCharacter.kana;
        userInput.focus();
    }

    // EVALUACIÓN DE RESPUESTA OPTIMIZADA PARA REPETICIÓN ESPACIADA
    gameForm.addEventListener('submit', function (event) {
        event.preventDefault();

        const answer = userInput.value.trim().toLowerCase();
        const correctAnswer = currentCharacter.romaji.toLowerCase();

        // Deshabilitar el botón y el input momentáneamente para evitar doble envío durante el feedback
        userInput.disabled = true;
        const submitBtn = gameForm.querySelector('button[type="submit"]');
        submitBtn.disabled = true;

        if (answer === correctAnswer) {
            score++;
            scoreCounter.innerText = `Aciertos: ${score}`;

            // Si estaba en la lista de errores y acertó, lo removemos
            removeFailedId(currentCharacter.id);

            feedbackMessage.innerText = "✨ ¡Correcto! ✨";
            feedbackMessage.className = "text-sm font-semibold p-3 rounded-xl bg-emerald-50 text-emerald-700 block";

            setTimeout(() => {
                userInput.disabled = false;
                submitBtn.disabled = false;
                nextQuestion();
            }, 1000); // 1 segundo de feedback antes de avanzar

        } else {
            // ¡Punto clave!: Si se equivocó, lo registramos para que reaparezca LUEGO
            addFailedId(currentCharacter.id);

            // Le mostramos la respuesta correcta para que aprenda del error
            feedbackMessage.innerText = `Incorrecto. El romaji correcto era: "${correctAnswer}"`;
            feedbackMessage.className = "text-sm font-semibold p-3 rounded-xl bg-rose-50 text-rose-700 block";

            // Avanzamos a un caracter NUEVO después de 3 segundos (para que le dé tiempo a leer)
            setTimeout(() => {
                userInput.disabled = false;
                submitBtn.disabled = false;
                nextQuestion(); // <--- ¡Ahora sí avanzamos!
            }, 3000);
        }
    });

    // Iniciar el juego
    loadCharacters();
</script>
{% endblock %}
