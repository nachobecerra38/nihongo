{% extends 'base.html' %}

{% block content %}
<div class="bg-white rounded-2xl shadow-xl p-8 border border-slate-100 text-center">

    <div class="flex justify-between items-center mb-6 text-sm text-slate-400 font-medium">
        <span id="score-counter">Aciertos: 0</span>
        <span id="group-tag" class="bg-slate-100 text-slate-600 px-2.5 py-1 rounded-md text-xs">Hiragana</span>
    </div>

    <div class="py-8 my-4 bg-slate-50 rounded-2xl border border-dashed border-slate-200">
        <div id="character-display" class="text-7xl font-extrabold text-slate-950 select-none animate-pulse">
            ...
        </div>
    </div>

    <form id="game-form" autocomplete="off" class="space-y-4">
        <div>
            <label for="user-input"
                class="block text-left text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">
                Escribe el Romaji (pronunciación):
            </label>
            <input type="text" id="user-input" required autofocus
                class="w-full text-center text-2xl font-bold p-3 bg-slate-50 border-2 border-slate-200 rounded-xl focus:border-indigo-500 focus:bg-white focus:outline-none transition uppercase tracking-widest">
        </div>

        <div id="feedback-message" class="hidden text-sm font-semibold p-3 rounded-xl transition-all"></div>

        <button type="submit"
            class="w-full bg-slate-900 hover:bg-slate-800 text-white font-medium py-3 px-4 rounded-xl shadow-lg transition duration-150">
            Comprobar
        </button>
    </form>
</div>

<script src="{{ url_for('static', filename='js/play.js') }}"></script>

{% endblock %}
