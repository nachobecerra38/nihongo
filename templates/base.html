<!DOCTYPE html>
<html lang="es" class="h-full bg-slate-50">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hiragana Master</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="h-full flex flex-col justify-between font-sans text-slate-800">

    <header class="bg-white shadow-sm border-b border-slate-200">
        <div class="max-w-4xl mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-xl font-bold text-indigo-600 tracking-wider">
                🇯🇵 ひらがな Hiragana Master
            </h1>
            <nav>
                <a href="/" class="text-sm font-medium text-slate-600 hover:text-indigo-600 transition">Inicio</a>
            </nav>
        </div>
    </header>

    <main class="flex-grow flex items-center justify-center p-4">
        <div class="max-w-md w-full">
            {% block content %}
            {% endblock %}
        </div>
    </main>

    <footer class="bg-white border-t border-slate-200 py-4 text-center text-xs text-slate-400">
        <p>&copy; 2026 - Juego de Hiragana con Flask & SQLite</p>
    </footer>

</body>

</html>
